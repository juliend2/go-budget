<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifier un Modèle - Suivi Budgétaire</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/styles.css">
    <style>
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            transition: color 0.2s ease;
        }
        .back-link:hover {
            color: #38bdf8;
        }
        .btn-cancel {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-secondary);
            padding: 0.75rem 1.5rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            display: inline-block;
            transition: all 0.2s ease;
        }
        .btn-cancel:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            margin-top: 0.5rem;
        }
        .checkbox-group input {
            width: auto;
        }
    </style>
</head>
<body>
    <div class="container" style="max-width: 800px;">
        <a href="/templates" class="back-link"><i class="fa-solid fa-arrow-left"></i> Retour aux modèles</a>

        <header style="margin-bottom: 2rem;">
            <div>
                <h1><i class="fa-solid fa-pen-to-square"></i> Modifier le Modèle</h1>
                <div class="subtitle">Mettre à jour cette dépense récurrente</div>
            </div>
        </header>

        <div class="panel">
            <form action="/template/edit" method="POST">
                <input type="hidden" name="template_id" value="{{.Template.ID.Hex}}">

                <div class="form-group">
                    <label for="edit-desc">Description</label>
                    <input type="text" id="edit-desc" name="description" value="{{.Template.Description}}" required autofocus>
                </div>
                <div class="form-group">
                    <label for="edit-amount">Montant ($)</label>
                    <input type="number" id="edit-amount" name="amount" value="{{.Template.Amount}}" min="0" required>
                </div>
                <div class="form-group">
                    <label for="edit-date">Première échéance</label>
                    <input type="date" id="edit-date" name="initial_to_be_paid_on" value="{{.Template.InitialToBePaidOn.Format "2006-01-02"}}" required>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem;">
                    <div class="form-group">
                        <label for="edit-unit">Intervalle</label>
                        <input type="number" id="edit-unit" name="interval_unit" value="{{.Template.RepeatabilityIntervalUnit}}" min="1" required>
                    </div>
                    <div class="form-group">
                        <label for="edit-pace">Fréquence</label>
                        <select id="edit-pace" name="interval_pace">
                            <option value="W" {{if eq .Template.RepeatabilityIntervalPace "W"}}selected{{end}}>Semaine(s)</option>
                            <option value="M" {{if eq .Template.RepeatabilityIntervalPace "M"}}selected{{end}}>Mois</option>
                            <option value="Y" {{if eq .Template.RepeatabilityIntervalPace "Y"}}selected{{end}}>Année(s)</option>
                            <option value="D" {{if eq .Template.RepeatabilityIntervalPace "D"}}selected{{end}}>Jour(s)</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <div class="checkbox-group">
                        <input type="checkbox" id="edit-hold" name="is_on_hold" {{if .Template.IsOnHold}}checked{{end}}>
                        <label for="edit-hold" style="margin: 0;">En pause (ne génère plus de dépenses)</label>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1.5rem;">
                    <a href="/templates" class="btn-cancel">Annuler</a>
                    <button type="submit" class="btn">Enregistrer les modifications</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
